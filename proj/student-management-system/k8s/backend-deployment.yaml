apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-dep
  labels:
    app: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      imagePullSecrets:
        - name : dockerhub-secret
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: env
                    operator: In
                    values:
                      - sbe
      containers:
        - name: backend
          image: sharmarjit1986/sbe:v1
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
          # livenessProbe:
          #   httpGet:
          #     path: /students
          #     port: 5000
          #   initialDelaySeconds: 20
          #   periodSeconds: 10

          # readinessProbe:
          #   httpGet:
          #     path: /students
          #     port: 5000
          #   initialDelaySeconds: 10
          #   periodSeconds: 5
          resources:
            requests:
              cpu: "400m"
              memory: "400Mi"
            limits:
              memory: "500Mi"
              cpu: "500m"

          env:
          - name: DB_NAME
            valueFrom: 
              configMapKeyRef:
                name: kuber-config
                key: DB_NAME

          - name: COLLECTION_NAME
            valueFrom: 
              configMapKeyRef:
                name: kuber-config
                key: COLLECTION_NAME

          - name: PORT
            valueFrom: 
              configMapKeyRef:
                name: kuber-config
                key: PORT

          - name: VITE_BACKEND_URL
            valueFrom: 
              configMapKeyRef:
                name: kuber-config
                key: VITE_BACKEND_URL

          - name: MONGO_URI
            valueFrom: 
              secretKeyRef:
                name: kuber-secret
                key: MONGO_URI
