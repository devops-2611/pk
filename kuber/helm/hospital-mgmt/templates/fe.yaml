apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
spec:
  replicas: {{ .Values.frontend.replicaCount }}

  selector:
    matchLabels:
      app: frontend

  template:
    metadata:
      labels:
        app: frontend

    spec:
#       imagePullSecrets:
# {{- range .Values.frontend.imagePullSecrets }}
#         - name: {{ . }}
# {{- end }}

      containers:
        - name: frontend
          imagePullPolicy: {{ .Values.frontend.imagePullPolicy }}
          image: "{{ .Values.frontend.image }}:{{ .Values.frontend.tag }}"

          ports:
            - containerPort: {{ .Values.frontend.containerPort }}

          resources:
            requests:
              cpu: {{ .Values.frontend.requests.cpu }}
              memory: {{ .Values.frontend.requests.memory }}
            limits:
              cpu: {{ .Values.frontend.limits.cpu }}
              memory: {{ .Values.frontend.limits.memory }}

          env:
{{/* 
{{- toYaml .Values.frontend.env | nindent 12 }}
*/}}
          {{- range .Values.frontend.env }}
          - name: {{ .name }}
            valueFrom:
              configMapKeyRef:
                name: {{ .valueFrom.configMapKeyRef.name }}
                key: {{ .valueFrom.configMapKeyRef.key }}
          {{- end }}

---

# service

apiVersion: v1
kind: Service
metadata:
  name: frontend
spec:
  type: {{ .Values.frontend.serviceType }}

  selector:
    app: frontend

  ports:
    - port: {{ .Values.frontend.servicePort }}
      targetPort: {{ .Values.frontend.containerPort }}
      nodePort: {{ .Values.frontend.nodePort }}